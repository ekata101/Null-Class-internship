<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password – QA Platform</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .new-password-box {
      margin-top: 12px;
      padding: 12px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      font-size: 14px;
      color: #166534;
      display: none;
      word-break: break-all;
    }
    .new-password-box.show { display: block; }
    .dark-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      font-size: 13px;
      color: #666;
    }
    .toggle-label { cursor: pointer; }
    body.dark { background: #1a1a2e; }
    body.dark .container { background: #16213e; color: #ddd; }
    body.dark input { background: #0f3460; color: #ddd; border-color: #555; }
    body.dark h1, body.dark h2 { color: #ddd; }
    body.dark .subtitle { color: #aaa; }
    body.dark a { color: #a78bfa; }
  </style>
</head>
<body>

<div class="container">
  <div class="dark-toggle">
    <input type="checkbox" id="darkToggle" onchange="toggleDark()">
    <label class="toggle-label" for="darkToggle">🌙 Dark Mode</label>
  </div>

  <h1>Forgot Password 🔐</h1>
  <p class="subtitle">Enter your email or phone to receive a new temporary password. (Limit: once per day)</p>

  <h2>Reset Password</h2>

  <input type="text" id="emailOrPhone" placeholder="Enter Email or Phone">

  <button id="resetBtn" onclick="resetPassword()">Reset Password</button>

  <div id="msg" class="msg"></div>
  <div id="newPassBox" class="new-password-box"></div>

  <a onclick="window.location='index.html'">← Back to Login</a>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
  function toggleDark() {
    document.body.classList.toggle("dark");
  }

  async function resetPassword() {
    const emailOrPhone = document.getElementById("emailOrPhone").value.trim();
    const btn = document.getElementById("resetBtn");
    const newPassBox = document.getElementById("newPassBox");

    newPassBox.className = "new-password-box";
    newPassBox.innerText = "";

    if (!emailOrPhone) {
      showMessage("Please enter your email or phone", "error");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Resetting...";

    try {
      const { res, data } = await apiFetch("/api/auth/forgot-password", {
        method: "POST",
        body: JSON.stringify({ emailOrPhone }),
      });

      if (!data.success) {
        showMessage(data.message, "error");
      } else {
        showMessage(data.message, "success");
        newPassBox.innerHTML = `🔑 <b>New Password:</b> <code>${data.newPassword}</code><br><small style="color:#888">Please change this after logging in.</small>`;
        newPassBox.className = "new-password-box show";
      }
    } catch {
      showMessage("Server not responding", "error");
    } finally {
      btn.disabled = false;
      btn.textContent = "Reset Password";
    }
  }
</script>
</body>
</html>
