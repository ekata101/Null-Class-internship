<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Language – QA Platform</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page-wrapper">

  <div class="dashboard-header">
    <h1>🌐 Change Language</h1>
    <p style="color:rgba(255,255,255,0.8);font-size:13px;margin-top:4px;">
      Verify your identity with an OTP to switch languages.
    </p>
    <div class="dashboard-actions">
      <button class="back-btn" onclick="window.location='dashboard.html'">← Dashboard</button>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="lang-card">
    <h2 id="stepTitle">Select Language</h2>

    <!-- Step 0: Choose language -->
    <div id="step0">
      <select id="langSelect" style="margin-top:10px;">
        <option value="">-- Select Language --</option>
        <option value="en">🇺🇸 English</option>
        <option value="es">🇪🇸 Español</option>
        <option value="hi">🇮🇳 हिंदी</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="pt">🇧🇷 Português</option>
        <option value="zh">🇨🇳 中文</option>
      </select>
      <button onclick="goToContact()">Continue →</button>
    </div>

    <!-- Step 1: Enter contact to receive OTP -->
    <div id="step1" style="display:none;">
      <p style="font-size:13px;color:#666;margin-bottom:10px;">Enter your email to receive a 6-digit OTP.</p>
      <input type="email" id="contact" placeholder="Enter your Email">
      <button onclick="sendOtp()">Send OTP</button>
      <a onclick="goBack(0)">← Change Language</a>
    </div>

    <!-- Step 2: Enter OTP -->
    <div id="step2" style="display:none;">
      <p style="font-size:13px;color:#666;margin-bottom:6px;">Enter the OTP sent to your email.</p>
      <div id="devOtpBox" style="display:none;font-size:13px;color:#0c4a6e;background:#e0f2fe;padding:8px;border-radius:6px;margin-bottom:10px;"></div>
      <input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6">
      <button onclick="verifyOtp()">Verify & Switch Language</button>
      <a onclick="goBack(1)">← Re-enter Email</a>
    </div>

    <div id="msg" class="msg" style="margin-top:12px;"></div>
  </div>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
  requireAuth();

  let selectedLang = "";
  let contactValue = "";

  function showStep(n) {
    [0, 1, 2].forEach(i => {
      document.getElementById(`step${i}`).style.display = i === n ? "block" : "none";
    });
    const titles = ["Select Language", "Verify Your Email", "Enter OTP"];
    document.getElementById("stepTitle").textContent = titles[n];
  }

  function goBack(n) {
    document.getElementById("msg").className = "msg";
    showStep(n);
  }

  function goToContact() {
    selectedLang = document.getElementById("langSelect").value;
    if (!selectedLang) {
      showMessage("Please select a language", "error");
      return;
    }
    showStep(1);
  }

  async function sendOtp() {
    contactValue = document.getElementById("contact").value.trim();
    if (!contactValue) {
      showMessage("Please enter your email", "error");
      return;
    }

    showMessage("Sending OTP...", "info");

    try {
      const { res, data } = await apiFetch("/api/otp/send", {
        method: "POST",
        body: JSON.stringify({ language: selectedLang, contact: contactValue }),
      });

      if (!data.success) {
        showMessage(data.message, "error");
        return;
      }

      showMessage("OTP sent! Check your email.", "success");
      showStep(2);

      // Show dev OTP if available (for testing)
      if (data.devOtp) {
        const box = document.getElementById("devOtpBox");
        box.style.display = "block";
        box.innerHTML = `🔧 <b>Dev OTP:</b> <code style="font-size:16px;">${data.devOtp}</code>`;
      }
    } catch {
      showMessage("Server not responding", "error");
    }
  }

  async function verifyOtp() {
    const otp = document.getElementById("otp").value.trim();
    if (!otp) {
      showMessage("Please enter the OTP", "error");
      return;
    }

    showMessage("Verifying...", "info");

    try {
      const { res, data } = await apiFetch("/api/otp/verify", {
        method: "POST",
        body: JSON.stringify({ contact: contactValue, otp }),
      });

      if (!data.success) {
        showMessage(data.message, "error");
        return;
      }

      // Switch language
      localStorage.setItem("lang", selectedLang);
      showMessage(window.t("languageSwitched"), "success");

      setTimeout(() => window.location = "dashboard.html", 1500);
    } catch {
      showMessage("Server not responding", "error");
    }
  }
</script>
</body>
</html>
